@if(running()) {
  <app-canvas [shapesSignal]="stage"></app-canvas>
}
@else {
  <div class="w-70 h-70 border-2 border-b-slate-700 flex flex-col items-center justify-center
  m-auto my-30
">
    <button (click)="handleNew()"
      class="bg-blue-600 px-4 py-2 text-white rounded-2xl">New</button>
    <label for="fileInput"
           class="bg-red-500 text-white px-3 rounded-2xl mt-2 py-2">
      load
      <input class="text-[0px]" type="file" name="fileInput" id="fileInput">
    </label>

  </div>
}

<router-outlet></router-outlet>
